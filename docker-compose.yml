version: '3.8'

services:

  recruitment-app:
    image: praveenx03/recruitment:v1.1.0
    container_name: recruitment-app
    environment:
      - MONGO_URI=mongodb://rootuser:rootpassword@mongo:27017/hr_system?authSource=admin
    depends_on:
      - mongo
    networks:
      - appnet

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - recruitment-app
    networks:
      - appnet

  mongo:
    image: mongo:7
    container_name: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=rootuser
      - MONGO_INITDB_ROOT_PASSWORD=rootpassword
    networks:
      - appnet

networks:
  appnet: