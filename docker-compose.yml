version: '3.8'

services:
  recruitment-app: 
    image: praveenx03/recruitment:v1.1.0
    container_name: recruitment-app
    environment:
      - MONGO_URI=mongodb://rootuser:rootpassword@nginx-proxy:27017/hr_system?authSource=admin
    depends_on:
      - Database
    ports:
      - "3000:3000"
    networks:
      - net1
    
  Nginx:
    image: nginx
    container_name: nginx-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - recruitment-app
    networks:
      - net1
      - net2
    ports:
      - "80:80"
      - "27017:27017"

  
  Database:
    image: mongo:7
    container_name: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=rootuser
      - MONGO_INITDB_ROOT_PASSWORD=rootpassword
    networks:
      - net2
    
      
networks:
  net1:
  net2:
