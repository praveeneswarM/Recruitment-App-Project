version: '3.8'

services:
  recruitment-app: 
    image: imageNamepraveenx03/recruitment:v1.1.0
    container_name: recruitment-app
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://rootuser:rootpassword@mongodb:27017/hr_system?authSource=rootuser
    depends_on:
      - Database
  
  Database:
    image: mongo:7
    container_name: mongo
    environment:
      - MONGO_USERNAME=rootuser
      - MONGO_PASSWORD=rootpassword
    ports:
      - "27017:27017"
    
      

